name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create Production Environment File
        run: |
          echo "VITE_YARBA_API_URL=${{ secrets.VITE_YARBA_API_URL }}" > .env.production
          echo "VITE_YARBA_PORTFOLIO_TOKEN=${{ secrets.VITE_YARBA_PORTFOLIO_TOKEN }}" >> .env.production
          echo "VITE_YARBA_PORTFOLIO_SUBDOMAIN=${{ secrets.VITE_YARBA_PORTFOLIO_SUBDOMAIN }}" >> .env.production

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
